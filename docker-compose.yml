services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ambassador-training-system:latest
    container_name: ambassador-training
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AI_SERVER_HOST: 0.0.0.0
      AI_SERVER_PORT: "3001"
    volumes:
      # SQLite 数据库与后台配置（settings.json）
      - app-data:/app/server/data
      # 知识库、活动图片等上传文件
      - app-uploads:/app/server/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  app-data:
  app-uploads:
